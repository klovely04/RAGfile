repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        pass_filenames: false
        args: ["app"]
        additional_dependencies:
          - fastapi>=0.115,<1.0
          - pydantic-settings>=2.4,<3.0
          - python-json-logger>=2.0,<3.0
